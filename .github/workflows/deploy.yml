name: CI - Build Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: next-app/package-lock.json
        
    - name: Install dependencies
      run: cd next-app && npm ci
        
    - name: Build Next.js app
      run: cd next-app && npm run build